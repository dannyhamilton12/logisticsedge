[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

# Redirect rules for SEO and clean URLs
[[redirects]]
  from = "/articles/*"
  to = "/articles/:splat"
  status = 200

[[redirects]]
  from = "/products/*"
  to = "/products/:splat"
  status = 200

# Redirect www to apex domain
[[redirects]]
  from = "https://www.logisticsedge.co.uk/*"
  to = "https://logisticsedge.co.uk/:splat"
  status = 301
  force = true

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"